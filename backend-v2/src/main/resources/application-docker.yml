server:
  port: 7777

spring:
  application:
    name: backend-v2
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

app:
  storage-type: FILE
  storage:
    file:
      path: /app/data/chat
  cliproxy:
    api-url: ${APP_CLIPROXY_API_URL:http://cli-proxy-api:8317}
    api-key: ${APP_CLIPROXY_API_KEY:your-api-key-1}