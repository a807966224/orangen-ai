services:
  # 初始化服务：首次运行前下载配置文件
  init-config:
    image: alpine:latest
    container_name: init-config
    volumes:
      - .:/data
    command: >
      sh -c "
        echo 'Checking existing config...'
        # 如果 config.yaml 是目录（之前错误创建的），先删除
        if [ -d /data/config.yaml ]; then
          echo 'Found config.yaml as directory, removing it...'
          rm -rf /data/config.yaml
        fi
        # 如果 config.yaml 文件不存在，则下载
        if [ ! -f /data/config.yaml ]; then
          echo 'Downloading config.yaml from GitHub...'
          wget --no-check-certificate -O /data/config.yaml 'https://raw.githubusercontent.com/router-for-me/CLIProxyAPI/main/config.example.yaml' || {
            echo 'Download failed, creating empty config file...'
            echo '# Configuration file - Please edit this file' > /data/config.yaml
          }
          echo 'config.yaml downloaded. You can edit it before starting services.'
        else
          echo 'config.yaml already exists as a file, skipping download.'
        fi
      "
    profiles:
      - init

  # CLI Proxy API - AI API代理服务 (8317端口)
  # 从 GitHub 下载源码构建，不依赖本地代码
  cli-proxy-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        CLI_PROXY_BRANCH: ${CLI_PROXY_BRANCH:-main}
    image: cli-proxy-api:latest
    container_name: cli-proxy-api
    environment:
      DEPLOY: ${DEPLOY:-}
    ports:
      - "8317:8317"
      - "8085:8085"
      - "1455:1455"
      - "54545:54545"
      - "51121:51121"
      - "11451:11451"
    volumes:
      - ${CLI_PROXY_CONFIG_PATH:-./config.yaml}:/CLIProxyAPI/config.yaml
      - ${CLI_PROXY_AUTH_PATH:-./auths}:/root/.cli-proxy-api
      - ${CLI_PROXY_LOG_PATH:-./logs}:/CLIProxyAPI/logs
    restart: unless-stopped
    networks:
      - orange-network
    healthcheck:
#      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8317/"]
      test: ["CMD", "curl", "-f", "http://localhost:8317/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Orange AI Backend - 后端服务 (7777端口)
  backend-v2:
    build:
      context: ../backend-v2
      dockerfile: ../docker/Dockerfile.backend
    container_name: backend-v2
    ports:
      - "7777:7777"
    volumes:
      - ${BACKEND_DATA_PATH:-./data}:/app/data
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      APP_CLIPROXY_API_URL: http://cli-proxy-api:8317
      APP_CLIPROXY_API_KEY: ${CLIPROXY_API_KEY:-your-api-key-1}
    restart: unless-stopped
    depends_on:
      cli-proxy-api:
        condition: service_healthy
    networks:
      - orange-network

  # CLI Proxy API Management Center - 管理UI (5173端口)
  # 从 GitHub 下载源码构建，不依赖本地目录
  management-center:
    build:
      context: .
      dockerfile: Dockerfile.management-center
      args:
        MANAGEMENT_CENTER_BRANCH: ${MANAGEMENT_CENTER_BRANCH:-main}
    container_name: management-center
    ports:
      - "5173:80"
    restart: unless-stopped
    depends_on:
      - cli-proxy-api
    networks:
      - orange-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  orange-network:
    driver: bridge